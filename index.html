<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiCraft AI - Roshan Murmu Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
        <style>
        /* DASHBOARD & APP DESIGN */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-user-select: none; }
        body { background: #090c12; color: #fff; overflow-x: hidden; }
        
        .auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #11141b; padding: 30px; border-radius: 25px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #222; }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; background: #05070a; border: 1px solid #222; border-radius: 12px; color: #fff; outline: none; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .app-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #11141b; border-bottom: 1px solid #222; }
        .badge { background: #00d2ff; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        
        .preset-selector { display: flex; gap: 10px; padding: 15px; justify-content: center; }
        .preset-btn { background: #1a1e26; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 12px; }
        
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .tool-card { background: #1a1e26; padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #222; }
        
        .app-preview { flex: 1; background: #000; margin: 0 15px 100px; border-radius: 20px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; position: relative; min-height: 200px;}
        .watermark { position: absolute; bottom: 10px; right: 10px; color: rgba(255,255,255,0.3); font-size: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #11141b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { background: none; border: none; color: #555; font-size: 12px; font-weight: bold; padding: 10px; }
        .nav-item.active { color: #00d2ff; }
        
        .main-btn { background: #00d2ff; color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* Support & Help */
        .support-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .support-card { background: #11141b; width: 85%; padding: 25px; border-radius: 20px; border: 1px solid #00d2ff; text-align: center;}
        #issue-box { width: 100%; height: 80px; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; margin: 10px 0; }
        </style>
    
<body oncontextmenu="return false;"> <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2 class="brand-logo">PixiCraft <span>AI</span></h2>
            <p class="tagline">Advance Video & Photo Studio</p>
            <div class="auth-form">
                <input type="email" id="user-email" placeholder="📧 Email Address" class="auth-input">
                <input type="password" id="user-pass" placeholder="🔒 Password" class="auth-input">
                <div class="remember-box">
                    <input type="checkbox" id="remember-me"> <label for="remember-me">Remember Me</label>
                </div>
                <button onclick="handleAuth()" class="main-btn">Enter Studio</button>
            </div>
            <p class="footer-text">By Roshan Web Studio</p>
        </div>
    </div>

    <div id="app-ui" class="app-container" style="display:none;">
        <header class="app-header">
            <div class="logo-section">
                <h3>PixiCraft Pro</h3>
            </div>
            <div class="header-actions">
                <span id="trial-days" class="badge">Trial</span>
                <button onclick="toggleSupport()" class="icon-btn">🛠️ Help</button>
            </div>
        </header>

        <main class="app-content">
            <div class="preset-selector">
                <button class="preset-btn" onclick="setPreset('9:16')">📱 Reel</button>
                <button class="preset-btn" onclick="setPreset('16:9')">📺 YouTube</button>
            </div>

            <div class="tool-grid" id="tools-display"></div>
            
            <div id="studio-output" class="app-preview">
                <div id="loader" class="loader" style="display:none;">⏳ Processing...</div>
                <div id="working-area" class="working-area">
                    <p>Select a tool to start creating</p>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showCategory('ai')">🪄 AI</button>
            <button class="nav-item" onclick="showCategory('video')">🎞️ Edit</button>
            <button class="nav-item" onclick="showCategory('audio')">🎵 Audio</button>
            <button class="nav-item" onclick="showCategory('assets')">🎨 FX</button>
        </nav>
    </div>

    <div id="support-modal" class="support-overlay" style="display:none;">
        <div class="support-card">
            <div class="support-header">
                <h4>Help Center</h4>
                <button onclick="toggleSupport()">✖</button>
            </div>
            <div class="support-body">
                <div class="support-link wa">💬 WhatsApp (Coming Soon)</div>
                <a href="mailto:roshanmurmu273@gmail.com" class="support-link mail">📧 roshanmurmu273@gmail.com</a>
                <hr>
                <h5>Report a Bug</h5>
                <textarea id="issue-box" placeholder="Technical details auto-collected..."></textarea>
                <button onclick="sendReport()" class="main-btn">Send Report</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
