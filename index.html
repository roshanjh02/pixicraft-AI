
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixiCraft-AI Pro | Roshan Murmu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div id="auth-overlay" class="secure-overlay">
        <div class="auth-card">
            <div class="shield-logo">🛡️</div>
            <h1 class="logo">PIXICRAFT-<span>AI</span></h1>
            <p class="security-text">ENCRYPTED STUDIO ACCESS</p>
            <div class="input-container">
                <input type="email" id="user-email" placeholder="Authorized Email">
                <input type="password" id="user-pass" placeholder="Security Key">
            </div>
            <button id="login-btn" onclick="secureLogin()" class="unlock-btn">BYPASS FIREWALL</button>
            <p id="lock-timer" class="timer-text"></p>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <header class="app-header">
            <div class="user-status" onclick="easterEgg()">🟢 Online</div>
            <h2 class="logo">PIXICRAFT-<span>AI</span></h2>
            <div class="header-tools">
                <button class="pro-tag" onclick="toggleModal('subs-modal')">👑 PRO</button>
                <button class="settings-btn" onclick="toggleModal('settings-modal')">⚙️</button>
            </div>
        </header>

        <nav class="pro-nav">
            <button id="btn-ai" class="nav-tab active" onclick="switchTab('ai')">AI ENGINE</button>
            <button id="btn-edit" class="nav-tab" onclick="switchTab('edit')">STUDIO</button>
            <button id="btn-audio" class="nav-tab" onclick="switchTab('audio')">SONICS</button>
            <button id="btn-fx" class="nav-tab" onclick="switchTab('fx')">VISUALS</button>
        </nav>

        <main id="tools-grid" class="main-grid"></main>

        <div class="preview-monitor">
            <div class="monitor-screen">Ready for 4K Rendering</div>
            <div class="monitor-info">FPS: 60 | RAM: Optimized | Developer: Roshan Murmu</div>
        </div>
    </div>

    <div id="settings-modal" class="modal-blur" style="display:none;">
        <div class="modal-card">
            <h3>System Settings</h3>
            <div class="setting-row">
                <span>Turbo Performance (Anti-Heat)</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <span>Auto-Cloud Backup</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <button class="close-btn" onclick="toggleModal('settings-modal')">SAVE & EXIT</button>
            <p class="version" onclick="devClick()">Version 2.0.4 Build #JH02</p>
        </div>
    </div>

    <div id="subs-modal" class="modal-blur" style="display:none;">
        <div class="modal-card">
            <h2>PRO PLANS</h2>
            <div class="plan" onclick="pay('49')"><span>Weekly</span><b>₹49</b></div>
            <div class="plan gold" onclick="pay('199')"><span>Monthly VIP</span><b>₹199</b></div>
            <button class="close-btn" onclick="toggleModal('subs-modal')">CLOSE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
